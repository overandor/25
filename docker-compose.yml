version: '3.8'

services:
  ip-credit-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RPC_URL=${RPC_URL}
      - IDENTITY_REGISTRY=${IDENTITY_REGISTRY}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - ENVIRONMENT=production
    volumes:
      - ./audit_logs:/app/audit_logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

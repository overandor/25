<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault Artifact Uploader</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }
    .page {
      max-width: 720px;
      width: 100%;
      padding: 32px 24px 48px;
      box-sizing: border-box;
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 16px;
      margin-bottom: 6px;
    }
    input, textarea, button, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      margin-top: 16px;
      background: #0ea5e9;
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover { background: #0284c7; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .status {
      margin-top: 18px;
      padding: 12px;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 140px;
      white-space: pre-wrap;
      overflow-x: auto;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    .hint { color: #475569; font-size: 13px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Vault Artifact Uploader</h1>
    <p class="hint">Upload IP artifacts to the Vault API, receive a deterministic hash, and submit the vault creation payload in one action.</p>
    <div class="card">
      <form id="vault-form">
        <label for="api-url">API Base URL</label>
        <input id="api-url" type="url" value="http://localhost:8000" required />
        <span class="hint">Point to the FastAPI host (defaults to local dev).</span>

        <label for="artifact">Artifact (PDF, ZIP, JSON, PNG, JPEG, TXT) – 10 MB max</label>
        <input id="artifact" name="artifact" type="file" required />

        <label for="owner">Owner Address</label>
        <input id="owner" name="owner" type="text" placeholder="0x..." pattern="^0x[a-fA-F0-9]{40}$" required />

        <label for="valuation">Valuation (USD)</label>
        <input id="valuation" name="valuation" type="number" step="0.01" min="0" placeholder="50000.00" required />

        <label for="loan-terms">Loan Terms (JSON)</label>
        <textarea id="loan-terms" name="loan-terms">{
  "duration_days": 90,
  "interest_rate": "5.5",
  "amortization": "bullet"
}</textarea>
        <span class="hint">JSON is posted directly to /vault/create after the upload returns an ip_hash.</span>

        <button id="submit" type="submit">Upload & Create Vault</button>
      </form>
      <div id="status" class="status">Ready.</div>
    </div>
  </div>

  <script>
    const form = document.getElementById('vault-form');
    const statusBox = document.getElementById('status');

    function log(message, data) {
      const time = new Date().toISOString();
      const payload = data ? `\n${JSON.stringify(data, null, 2)}` : '';
      statusBox.textContent = `[${time}] ${message}${payload}`;
    }

    async function uploadArtifact(apiBase, file) {
      const formData = new FormData();
      formData.append('file', file);

      const resp = await fetch(`${apiBase}/vault/upload`, {
        method: 'POST',
        body: formData,
      });

      if (!resp.ok) {
        const errorText = await resp.text();
        throw new Error(`Upload failed (${resp.status}): ${errorText}`);
      }

      return resp.json();
    }

    async function createVault(apiBase, ipHash, valuation, owner, loanTerms) {
      const body = {
        ip_hash: ipHash,
        valuation_usd: valuation,
        owner_address: owner,
        loan_terms: loanTerms,
      };

      const resp = await fetch(`${apiBase}/vault/create`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!resp.ok) {
        const errorText = await resp.text();
        throw new Error(`Vault creation failed (${resp.status}): ${errorText}`);
      }

      return resp.json();
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const submitButton = document.getElementById('submit');
      submitButton.disabled = true;

      try {
        const apiBase = document.getElementById('api-url').value.trim().replace(/\/$/, '');
        const fileInput = document.getElementById('artifact');
        const owner = document.getElementById('owner').value.trim();
        const valuation = document.getElementById('valuation').value.trim();
        const loanTermsRaw = document.getElementById('loan-terms').value.trim();

        if (!fileInput.files || fileInput.files.length === 0) {
          throw new Error('Choose a file before submitting.');
        }

        let loanTerms;
        try {
          loanTerms = loanTermsRaw ? JSON.parse(loanTermsRaw) : {};
        } catch (err) {
          throw new Error('Loan terms must be valid JSON.');
        }

        log('Uploading artifact...');
        const uploadResult = await uploadArtifact(apiBase, fileInput.files[0]);
        log('Artifact uploaded. Creating vault...', uploadResult);

        const vaultResult = await createVault(apiBase, uploadResult.ip_hash, valuation, owner, loanTerms);
        log('Vault created successfully.', vaultResult);
      } catch (error) {
        log('Error', { message: error.message });
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
